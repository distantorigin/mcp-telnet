name: Build MCPB Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Pack MCPB bundle
        run: npx @anthropic-ai/mcpb pack . mcp-telnet-${{ github.ref_name }}.mcpb

      - name: Upload MCPB to release
        uses: softprops/action-gh-release@v2
        with:
          files: mcp-telnet-${{ github.ref_name }}.mcpb
